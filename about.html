<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>About | Lisha Studio</title>
  <meta name="description" content="About Lisha Studio handmade art objects." />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Nunito:wght@400;500;600;700;800&display=swap');

    :root {
      --bg: #fffdf8;
      --text: #1f1b18;
      --muted: #756d66;
      --line: #eee5dc;
      --soft: #fff4e4;
      --pink: #ffe8ec;
      --accent: #f08a5d;
      --accent-dark: #d9693f;
      --card: #ffffff;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Nunito", Arial, sans-serif;
    }

    /* 顶部导航：和首页保持一致 */
    header {
      padding: 26px 34px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 253, 248, 0.96);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    nav a {
      margin-left: 28px;
      color: var(--text);
      text-decoration: none;
      font-size: 16px;
      font-weight: 800;
    }

    nav a:hover {
      color: var(--accent-dark);
    }

    /* 页面主体宽度和上下留白 */
    main {
      max-width: 1040px;
      margin: 0 auto;
      padding: 76px 24px 90px;
    }

    /* 页面标题 */
    .intro {
      text-align: center;
      margin-bottom: 42px;
    }

    .intro h1 {
      font-family: "Baloo 2", cursive;
      font-size: clamp(50px, 8vw, 82px);
      line-height: 0.95;
      margin: 0 0 16px;
    }

    .intro p {
      color: var(--muted);
      font-size: 19px;
      line-height: 1.7;
      max-width: 720px;
      margin: 0 auto;
    }

    /* 三个 About 小视频 */
    .about-video-grid {
      display: none;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      margin: 0 0 30px;
    }

    .about-video-card {
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: var(--soft);
      box-shadow: 0 14px 34px rgba(80, 51, 32, 0.08);
      aspect-ratio: 1 / 1;
    }

    .about-video-card video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* 品牌介绍卡片 */
    .story-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 32px;
      padding: 36px 40px;
      box-shadow: 0 14px 34px rgba(80, 51, 32, 0.08);
      margin-bottom: 34px;
    }

    .story-card h2 {
      font-family: "Baloo 2", cursive;
      font-size: 34px;
      line-height: 1.05;
      margin: 0 0 14px;
    }

    .story-card p {
      color: var(--muted);
      line-height: 1.8;
      font-size: 17px;
      margin: 0;
      white-space: pre-line;
    }

    /* Email / WhatsApp / YouTube 按钮 */
    .about-contact-links {
      margin-top: 12px;
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .about-contact-links a {
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 13px 24px;
      text-decoration: none;
      font-weight: 900;
      background: var(--soft);
    }

    .about-contact-links a:hover {
      background: linear-gradient(135deg, var(--soft), var(--pink));
      color: var(--accent-dark);
      border-color: var(--line);
    }

    /* 底部 footer：修复你截图里左下角歪掉的问题 */
    footer {
      text-align: center;
      padding: 32px 20px;
      color: var(--muted);
      font-size: 14px;
      border-top: 1px solid var(--line);
    }

    /* footer 变成链接，但保持原来的灰色小字、无下划线 */
    .footer-link {
      color: var(--muted);
      text-decoration: none;
    }

    .footer-link:hover {
      color: var(--accent-dark);
      text-decoration: none;
    }

    /* 平板 */
    @media (max-width: 850px) {
      header {
        justify-content: center;
        padding: 22px 18px;
      }

      nav a {
        margin: 0 9px;
      }

      .about-video-grid {
        grid-template-columns: 1fr;
      }

      .story-card {
        padding: 26px;
      }
    }

    /* 手机 */
    @media (max-width: 560px) {
      nav a {
        font-size: 15px;
        margin: 0 6px;
      }

      main {
        padding: 56px 20px 72px;
      }

      .intro h1 {
        font-size: clamp(44px, 14vw, 68px);
      }

      .intro p {
        font-size: 17px;
      }
    }
  </style>
</head>

<body>
  <header>
    <nav>
      <a href="/">Home</a>
      <a href="/#products">Products</a>
      <a href="/#contact">Contact</a>
    </nav>
  </header>

  <main>
    <section class="intro">
      <h1 id="aboutTitle">Meet Lisha Studio</h1>
      <p id="aboutSubtitle">Handmade little joys for cozy corners, gifts, and everyday spaces.</p>
    </section>

    <!-- 三个小视频由 JS 自动填入 -->
    <section class="about-video-grid" id="aboutVideoGrid"></section>

    <section class="story-card">
      <h2 id="aboutStoryTitle">Hello, I’m Lisha.</h2>
      <p id="aboutStoryText">Lisha Studio is where I turn small ideas into playful handmade pieces.
         <!-- 联系按钮由 JS 自动读取 Settings 表填入 -->
    <div class="about-contact-links" id="aboutContactLinks"></div>
      </p>
    </section>
  </main>

  <footer>
    <a href="/about.html" class="footer-link">@ Lisha Studio · Handmade little joy:)</a>
  </footer>

  <script>
    const SETTINGS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRQ5vcuUBnI85arPNNe2h-aqwqq_9RpCBN0oewhCexPjWd-nX7YW-j3ii_5JlwvZZ7VlyjZ_RSTVwD5/pub?gid=0&single=true&output=csv"; // Settings 表 CSV
    const VIDEO_BASE_URL = "https://pub-32f3f529081e4033a9e6ecf3fd1297ae.r2.dev/images/"; // R2 文件路径

    const ABOUT_VIDEOS = [
      "about-1.mp4", // 第 1 个小视频
      "about-2.mp4", // 第 2 个小视频
      "about-3.mp4"  // 第 3 个小视频
    ];

    function parseCSV(text) { // 解析 CSV
      const rows = [];
      let row = [];
      let value = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const nextChar = text[i + 1];

        if (char === '"' && inQuotes && nextChar === '"') {
          value += '"';
          i++;
        } else if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === "," && !inQuotes) {
          row.push(value);
          value = "";
        } else if ((char === "\n" || char === "\r") && !inQuotes) {
          if (value || row.length) {
            row.push(value);
            rows.push(row);
            row = [];
            value = "";
          }
          if (char === "\r" && nextChar === "\n") i++;
        } else {
          value += char;
        }
      }

      if (value || row.length) {
        row.push(value);
        rows.push(row);
      }

      return rows;
    }

    function rowsToSettings(rows) { // Settings 表转成对象
      const settings = {};

      rows.slice(1).forEach(row => {
        const key = row[0] ? row[0].trim().toLowerCase() : "";
        const value = row[1] ? row[1].trim() : "";
        if (key) settings[key] = value;
      });

      return settings;
    }

    async function loadSettings() { // 读取 Settings 表
      const joiner = SETTINGS_CSV_URL.includes("?") ? "&" : "?";
      const response = await fetch(SETTINGS_CSV_URL + joiner + "cacheBust=" + Date.now());

      if (!response.ok) {
        throw new Error("Could not load Settings CSV");
      }

      const text = await response.text();
      return rowsToSettings(parseCSV(text));
    }

    function setting(settings, key, fallback) { // 读取表格文字；没有就用默认值
      return settings[key.toLowerCase()] || fallback;
    }

    function renderVideos() { // 渲染 3 个小视频
      const videoGrid = document.getElementById("aboutVideoGrid");
      const videos = ABOUT_VIDEOS.filter(Boolean);

      if (!videos.length) {
        videoGrid.style.display = "none";
        videoGrid.innerHTML = "";
        return;
      }

      videoGrid.style.display = "grid";
      videoGrid.innerHTML = videos.map((fileName) => `
        <div class="about-video-card">
          <video autoplay muted loop playsinline preload="metadata">
            <source src="${VIDEO_BASE_URL + fileName}" type="video/mp4">
          </video>
        </div>
      `).join("");
    }

    function renderContactLinks(settings) { // 渲染 Email / WhatsApp / YouTube 按钮
      const links = document.getElementById("aboutContactLinks");

      const email = setting(settings, "contact.email", "");
      const whatsapp = setting(settings, "contact.whatsapp", "");
      const youtube = setting(settings, "contact.youtube", "");

      links.innerHTML = "";

      if (email) {
        links.innerHTML += `<a href="mailto:${email}">Email</a>`;
      }

      if (whatsapp) {
        links.innerHTML += `<a href="${whatsapp}" target="_blank" rel="noopener">WhatsApp</a>`;
      }

      if (youtube) {
        links.innerHTML += `<a href="${youtube}" target="_blank" rel="noopener">YouTube</a>`;
      }
    }

    loadSettings()
      .then(settings => {
        document.getElementById("aboutTitle").textContent = setting(settings, "about.title", "Meet Lisha Studio");
        document.getElementById("aboutSubtitle").textContent = setting(settings, "about.subtitle", "Handmade little joys for cozy corners, gifts, and everyday spaces.");
        document.getElementById("aboutStoryTitle").textContent = setting(settings, "about.storyTitle", "Hello, I’m Lisha.");
        document.getElementById("aboutStoryText").textContent = setting(settings, "about.storyText", "Lisha Studio is where I turn small ideas into playful handmade pieces. From candles to decorative objects, each piece is made with soft colors, curious shapes, and a little sense of humor.");

        document.title = setting(settings, "about.title", "Meet Lisha Studio") + " | Lisha Studio";

        renderVideos();
        renderContactLinks(settings);
      })
      .catch(error => {
        console.error(error);
        renderVideos();
      });
  </script>
</body>
</html>
