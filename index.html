<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lisha Studio | Handmade Art Objects</title>
  <meta name="description" content="Lisha Studio handmade art objects, candles, gifts, and playful little things." />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Nunito:wght@400;500;600;700;800&display=swap');

    :root {
      --bg: #fffdf8;
      --text: #1f1b18;
      --muted: #756d66;
      --line: #eee5dc;
      --soft: #fff4e4;
      --pink: #ffe8ec;
      --accent: #f08a5d;
      --accent-dark: #d9693f;
      --card: #ffffff;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Nunito", Arial, sans-serif;
    }

    header {
      padding: 26px 34px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 253, 248, 0.96);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    nav a {
      margin-left: 28px;
      color: var(--text);
      text-decoration: none;
      font-size: 16px;
      font-weight: 800;
    }

    nav a:hover { color: var(--accent-dark); }

    .hero-video {
      width: 100%;
      max-height: 420px;
      background: var(--soft);
      overflow: hidden;
      border-bottom: 1px solid var(--line);
      display: none;
    }

    .hero-video video,
    .hero-video iframe {
      width: 100%;
      height: 420px;
      display: block;
      object-fit: cover;
      border: 0;
    }

    .hero {
      max-width: 980px;
      margin: 0 auto;
      padding: 84px 24px 56px;
      text-align: center;
    }

    .hero h1 {
      font-family: "Baloo 2", cursive;
      font-size: clamp(48px, 8vw, 82px);
      line-height: 0.95;
      margin: 0 0 14px;
      letter-spacing: -1px;
    }

    .hero p {
      max-width: 660px;
      margin: 0 auto;
      color: var(--muted);
      font-size: 19px;
      line-height: 1.7;
    }

    .section {
      max-width: 1120px;
      margin: 0 auto;
      padding: 38px 24px 78px;
    }

    .section-title {
      font-family: "Baloo 2", cursive;
      font-size: 40px;
      margin: 0 0 24px;
      text-align: center;
      line-height: 1;
    }

    .filters {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 30px;
    }

    .filters input,
    .filters select {
      border: 1px solid var(--line);
      background: white;
      border-radius: 999px;
      padding: 13px 17px;
      font-family: "Nunito", sans-serif;
      font-size: 15px;
      min-width: 210px;
      outline: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 26px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 14px 34px rgba(80, 51, 32, 0.08);
      transition: transform 0.2s ease;
    }

    .card:hover { transform: translateY(-3px); }

    .image {
      position: relative;
      aspect-ratio: 1 / 1;
      background: linear-gradient(135deg, var(--soft), var(--pink));
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: "Baloo 2", cursive;
      font-size: 58px;
      color: var(--accent-dark);
    }

    .image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .badge {
      position: absolute;
      top: 14px;
      left: 14px;
      background: rgba(255, 253, 248, 0.94);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 13px;
      font-weight: 900;
      color: var(--accent-dark);
      box-shadow: 0 8px 18px rgba(80, 51, 32, 0.08);
    }

    .card-body { padding: 19px; }

    .card h3 {
      font-family: "Baloo 2", cursive;
      font-size: 25px;
      line-height: 1.08;
      margin: 0 0 8px;
    }

    .desc {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.55;
      min-height: 46px;
      margin: 0 0 12px;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
      font-weight: 800;
    }

    .price { font-size: 18px; }

    .stock {
      font-size: 13px;
      color: var(--accent-dark);
      background: var(--soft);
      border-radius: 999px;
      padding: 5px 10px;
      white-space: nowrap;
    }

    .button {
      display: block;
      width: 100%;
      text-align: center;
      border: 1px solid var(--text);
      color: var(--text);
      background: white;
      text-decoration: none;
      border-radius: 999px;
      padding: 12px 14px;
      font-weight: 800;
      transition: 0.2s ease;
      cursor: pointer;
    }

    .button:hover {
      background: var(--text);
      color: white;
    }

    .button.soft {
      border-color: var(--line);
      background: var(--soft);
      color: var(--accent-dark);
    }

    .button.soft:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .button.disabled {
      opacity: 0.45;
      pointer-events: none;
    }

    .contact {
      border-top: 1px solid var(--line);
      padding: 62px 24px;
      text-align: center;
      background: #ffffff;
    }

    .contact p {
      max-width: 720px;
      margin: 0 auto;
      color: var(--muted);
      line-height: 1.8;
      font-size: 17px;
    }

    .contact-links {
      margin-top: 24px;
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .contact-links a {
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 11px 16px;
      text-decoration: none;
      font-weight: 800;
      background: var(--soft);
    }

    .contact-links a:hover {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    footer {
      text-align: center;
      padding: 32px 20px;
      color: var(--muted);
      font-size: 14px;
      border-top: 1px solid var(--line);
    }

    .loading,
    .error {
      text-align: center;
      color: var(--muted);
      padding: 36px;
      grid-column: 1 / -1;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(31, 27, 24, 0.45);
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
    }

    .modal {
      width: min(980px, 100%);
      max-height: 90vh;
      overflow: auto;
      background: var(--bg);
      border-radius: 34px;
      border: 1px solid var(--line);
      box-shadow: 0 30px 90px rgba(31, 27, 24, 0.25);
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 18px;
      right: 18px;
      border: 1px solid var(--line);
      background: white;
      border-radius: 999px;
      width: 40px;
      height: 40px;
      font-size: 22px;
      cursor: pointer;
      z-index: 3;
    }

    .modal-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
      padding: 34px;
    }

    .modal-main-image {
      position: relative;
      aspect-ratio: 1 / 1;
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: linear-gradient(135deg, var(--soft), var(--pink));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Baloo 2", cursive;
      font-size: 78px;
      color: var(--accent-dark);
    }

    .modal-main-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .thumbs {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .thumb {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      border: 1px solid var(--line);
      overflow: hidden;
      background: var(--soft);
      cursor: pointer;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .modal-info h2 {
      font-family: "Baloo 2", cursive;
      font-size: clamp(38px, 5vw, 58px);
      line-height: 0.95;
      margin: 0 0 12px;
    }

    .modal-info p {
      color: var(--muted);
      line-height: 1.75;
      font-size: 16px;
    }

    .sku-options {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 16px 0;
    }

    .sku-option {
      border: 1px solid var(--line);
      background: white;
      border-radius: 999px;
      padding: 9px 14px;
      font-weight: 800;
      cursor: pointer;
    }

    .sku-option.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .details-list {
      margin: 14px 0 18px;
      padding: 0;
      list-style: none;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .details-list strong {
      color: var(--text);
    }

    @media (max-width: 850px) {
      header {
        justify-content: center;
        padding: 22px 18px;
      }

      nav a {
        margin: 0 9px;
      }

      .grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .hero-video video,
      .hero-video iframe {
        height: 300px;
      }

      .modal-layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      nav a {
        font-size: 15px;
        margin: 0 6px;
      }

      .hero {
        padding-top: 58px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .filters input,
      .filters select {
        width: 100%;
      }

      .modal-layout {
        padding: 24px;
      }
    }
  </style>
</head>

<body id="top">
  <header>
    <nav>
      <a href="/">Home</a>
      <a href="/#products">Products</a>
      <a href="/about.html">About</a>
      <a href="/#contact">Contact</a>
    </nav>
  </header>

  <section class="hero-video" id="videoArea"></section>

  <main>
    <section class="hero">
      <h1 id="heroTitle">Lisha Studio</h1>
      <p id="heroSubtitle">Handmade art objects, candles, gifts, and playful little things.</p>
    </section>

    <section class="section" id="products">
      <h2 class="section-title" id="featuredTitle">Featured Pieces</h2>

      <div class="filters">
        <input id="searchInput" type="search" placeholder="Search pieces..." />
        <select id="categoryFilter">
          <option value="all">All categories</option>
        </select>
      </div>

      <div class="grid" id="productGrid">
        <div class="loading">Loading products...</div>
      </div>
    </section>

    <section class="contact" id="contact">
      <h2 class="section-title">Contact</h2>
      <p id="contactNote">For custom orders, collaborations, or questions, feel free to contact me.</p>
      <div class="contact-links" id="contactLinks"></div>
    </section>
  </main>

  <div class="modal-backdrop" id="productModal">
    <div class="modal">
      <button class="modal-close" id="modalClose">×</button>
      <div class="modal-layout" id="modalContent"></div>
    </div>
  </div>

  <footer>
    © 2026 Lisha Studio · Handmade art objects
  </footer>

  <script>
    const SETTINGS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRQ5vcuUBnI85arPNNe2h-aqwqq_9RpCBN0oewhCexPjWd-nX7YW-j3ii_5JlwvZZ7VlyjZ_RSTVwD5/pub?gid=0&single=true&output=csv";
    const PRODUCTS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRQ5vcuUBnI85arPNNe2h-aqwqq_9RpCBN0oewhCexPjWd-nX7YW-j3ii_5JlwvZZ7VlyjZ_RSTVwD5/pub?gid=22339288&single=true&output=csv";

    let allRows = [];
    let groupedProducts = [];
    let siteSettings = {};

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let value = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const nextChar = text[i + 1];

        if (char === '"' && inQuotes && nextChar === '"') {
          value += '"';
          i++;
        } else if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === "," && !inQuotes) {
          row.push(value);
          value = "";
        } else if ((char === "\n" || char === "\r") && !inQuotes) {
          if (value || row.length) {
            row.push(value);
            rows.push(row);
            row = [];
            value = "";
          }
          if (char === "\r" && nextChar === "\n") i++;
        } else {
          value += char;
        }
      }

      if (value || row.length) {
        row.push(value);
        rows.push(row);
      }

      return rows;
    }

    function rowsToObjects(rows) {
      if (!rows.length) return [];
      const headers = rows[0].map(h => h.trim().toLowerCase());

      return rows.slice(1)
        .filter(row => row.some(cell => String(cell).trim() !== ""))
        .map(row => {
          const obj = {};
          headers.forEach((header, index) => {
            obj[header] = row[index] ? row[index].trim() : "";
          });
          return obj;
        });
    }

    async function loadCSV(url) {
      const response = await fetch(url + "&cacheBust=" + Date.now());
      if (!response.ok) throw new Error("Could not load CSV: " + url);
      const text = await response.text();
      return rowsToObjects(parseCSV(text));
    }

    function getValue(obj, key) {
      return obj[key.toLowerCase()] || "";
    }

    function cleanStatus(row) {
      return getValue(row, "status").toLowerCase().trim();
    }

    function isHidden(row) {
      return cleanStatus(row) === "hidden";
    }

    function rowHasRequiredInfo(row) {
      return Boolean(
        getValue(row, "id") &&
        getValue(row, "name") &&
        getValue(row, "price") &&
        getValue(row, "category")
      );
    }

    function rowIsActive(row) {
      return cleanStatus(row) === "active" && rowHasRequiredInfo(row);
    }

    function rowIsSoldOut(row) {
      return rowIsActive(row) && Number(getValue(row, "stock") || 0) <= 0;
    }

    function rowIsComingSoon(row) {
      if (isHidden(row)) return false;
      if (cleanStatus(row) !== "active") return true;
      if (!rowHasRequiredInfo(row)) return true;
      return false;
    }

    function money(value) {
      const number = Number(value);
      if (Number.isNaN(number)) return "";
      return "USD " + number.toFixed(2);
    }

    function imageBaseFor(row) {
      const id = getValue(row, "id");
      const sku = getValue(row, "sku");
      return sku ? `${id}-${sku}` : id;
    }

    function imagePath(row, index) {
      return `/images/${imageBaseFor(row)}-${index}.jpg`;
    }

    function imageFallbackText(row) {
      const name = getValue(row, "name");
      return name ? name.charAt(0) : "✦";
    }

    function createImageHTML(row, index = 0) {
      const fallback = imageFallbackText(row);
      const src = imagePath(row, index);
      return `<img src="${src}" alt="${getValue(row, "name")}" onerror="this.replaceWith(document.createTextNode('${fallback}'))">`;
    }

    function createVideo(videoUrl) {
      const videoArea = document.getElementById("videoArea");

      if (!videoUrl) {
        videoArea.style.display = "none";
        videoArea.innerHTML = "";
        return;
      }

      videoArea.style.display = "block";

      if (videoUrl.includes("youtube.com") || videoUrl.includes("youtu.be") || videoUrl.includes("vimeo.com")) {
        videoArea.innerHTML = `<iframe src="${videoUrl}" allowfullscreen></iframe>`;
      } else {
        videoArea.innerHTML = `
          <video autoplay muted loop playsinline>
            <source src="${videoUrl}" />
          </video>
        `;
      }
    }

    function applySettings(settingsRows) {
      settingsRows.forEach(row => {
        const key = getValue(row, "key");
        const value = getValue(row, "value");
        if (key) siteSettings[key.toLowerCase()] = value;
      });

      const title = siteSettings["index.herotitle"] || siteSettings.herotitle || "Lisha Studio";
      const subtitle = siteSettings["index.herosubtitle"] || siteSettings.herosubtitle || "Handmade art objects, candles, gifts, and playful little things.";
      const featuredTitle = siteSettings["index.featuredtitle"] || "Featured Pieces";
      const video = siteSettings["index.herovideo"] || siteSettings.herovideo || "";
      const contactNote = siteSettings["contact.note"] || siteSettings.contactnote || "For custom orders, collaborations, or questions, feel free to contact me.";
      const contactEmail = siteSettings["contact.email"] || siteSettings.contactemail || "";
      const contactInstagram = siteSettings["contact.instagram"] || siteSettings.contactinstagram || "";
      const contactYoutube = siteSettings["contact.youtube"] || siteSettings.contactyoutube || siteSettings.youtube || "";

      document.title = title + " | Handmade Art Objects";
      document.getElementById("heroTitle").textContent = title;
      document.getElementById("heroSubtitle").textContent = subtitle;
      document.getElementById("featuredTitle").textContent = featuredTitle;
      document.getElementById("contactNote").textContent = contactNote;

      const contactLinks = document.getElementById("contactLinks");
      contactLinks.innerHTML = "";

      if (contactEmail) {
        contactLinks.innerHTML += `<a href="mailto:${contactEmail}">Email</a>`;
      }

      if (contactInstagram) {
        contactLinks.innerHTML += `<a href="${contactInstagram}" target="_blank" rel="noopener">Instagram</a>`;
      }

      if (contactYoutube) {
        contactLinks.innerHTML += `<a href="${contactYoutube}" target="_blank" rel="noopener">YouTube</a>`;
      }

      createVideo(video);
    }

    function groupProducts(rows) {
      const visibleRows = rows.filter(row => !isHidden(row));
      const map = new Map();

      visibleRows.forEach(row => {
        const id = getValue(row, "id");
        if (!id) return;

        if (!map.has(id)) {
          map.set(id, []);
        }

        map.get(id).push(row);
      });

      return Array.from(map.entries()).map(([id, variants]) => {
        const first = variants[0];
        const activeVariants = variants.filter(row => rowIsActive(row));
        const purchasableVariants = activeVariants.filter(row => Number(getValue(row, "stock") || 0) > 0);

        let displayRow = purchasableVariants[0] || activeVariants[0] || first;

        let state = "comingsoon";
        if (variants.every(row => rowIsComingSoon(row))) {
          state = "comingsoon";
        } else if (activeVariants.length > 0 && activeVariants.every(row => Number(getValue(row, "stock") || 0) <= 0)) {
          state = "soldout";
        } else if (purchasableVariants.length > 0) {
          state = "active";
        }

        return {
          id,
          name: getValue(first, "name"),
          category: getValue(first, "category"),
          variants,
          displayRow,
          state
        };
      });
    }

    function badgeText(state) {
      if (state === "soldout") return "Sold out";
      if (state === "comingsoon") return "Coming soon";
      return "";
    }

    function priceText(product) {
      const prices = product.variants
        .filter(row => rowIsActive(row))
        .map(row => Number(getValue(row, "price")))
        .filter(num => !Number.isNaN(num));

      if (!prices.length) return "";

      const min = Math.min(...prices);
      const max = Math.max(...prices);

      if (min === max) return money(min);
      return "From " + money(min);
    }

    function stockText(product) {
      if (product.state === "comingsoon") return "Coming soon";
      if (product.state === "soldout") return "Sold out";

      const total = product.variants
        .filter(row => rowIsActive(row))
        .reduce((sum, row) => sum + Number(getValue(row, "stock") || 0), 0);

      return total + " in stock";
    }

    function renderCategories(products) {
      const select = document.getElementById("categoryFilter");
      select.innerHTML = '<option value="all">All categories</option>';

      const categories = [...new Set(products.map(p => p.category).filter(Boolean))].sort();

      categories.forEach(category => {
        const option = document.createElement("option");
        option.value = category;
        option.textContent = category;
        select.appendChild(option);
      });
    }

    function productCard(product) {
      const row = product.displayRow;
      const badge = badgeText(product.state);
      const description = getValue(row, "shortdescription") || getValue(row, "longdescription") || "";
      const hasMultipleSku = product.variants.length > 1;

      return `
        <article class="card">
          <div class="image">
            ${badge ? `<div class="badge">${badge}</div>` : ""}
            ${createImageHTML(row, 0)}
          </div>
          <div class="card-body">
            <h3>${product.name}</h3>
            <p class="desc">${description}</p>
            <div class="meta">
              <div class="price">${priceText(product)}</div>
              <div class="stock">${stockText(product)}</div>
            </div>
            <button class="button soft" onclick="openProductModal('${product.id}')">
              ${hasMultipleSku ? "View options" : "View details"}
            </button>
          </div>
        </article>
      `;
    }

    function renderProducts() {
      const grid = document.getElementById("productGrid");
      const query = document.getElementById("searchInput").value.toLowerCase().trim();
      const category = document.getElementById("categoryFilter").value;

      const filtered = groupedProducts.filter(product => {
        const text = product.variants.map(row => [
          getValue(row, "name"),
          getValue(row, "category"),
          getValue(row, "shortdescription"),
          getValue(row, "longdescription"),
          getValue(row, "materials"),
          getValue(row, "sku")
        ].join(" ")).join(" ").toLowerCase();

        const matchesSearch = text.includes(query);
        const matchesCategory = category === "all" || product.category === category;

        return matchesSearch && matchesCategory;
      });

      if (!filtered.length) {
        grid.innerHTML = '<div class="error">No products found.</div>';
        return;
      }

      grid.innerHTML = filtered.map(productCard).join("");
    }

    function openProductModal(productId) {
      const product = groupedProducts.find(p => p.id === productId);
      if (!product) return;

      const activeVariants = product.variants.filter(row => !isHidden(row));
      const firstAvailable = activeVariants.find(row => rowIsActive(row) && Number(getValue(row, "stock") || 0) > 0);
      const selected = firstAvailable || product.displayRow;

      renderModal(product, selected);
      document.getElementById("productModal").style.display = "flex";
      document.body.style.overflow = "hidden";
    }

    function closeProductModal() {
      document.getElementById("productModal").style.display = "none";
      document.body.style.overflow = "";
    }

    function renderModal(product, selectedRow) {
      const modal = document.getElementById("modalContent");
      const sku = getValue(selectedRow, "sku");
      const variants = product.variants.filter(row => !isHidden(row));
      const selectedStatus = rowIsComingSoon(selectedRow)
        ? "comingsoon"
        : rowIsSoldOut(selectedRow)
          ? "soldout"
          : "active";

      const badge = badgeText(selectedStatus);
      const price = rowIsActive(selectedRow) ? money(getValue(selectedRow, "price")) : "";
      const stock = rowIsActive(selectedRow)
        ? Number(getValue(selectedRow, "stock") || 0)
        : 0;

      const stockLabel = selectedStatus === "comingsoon"
        ? "Coming soon"
        : selectedStatus === "soldout"
          ? "Sold out"
          : stock + " in stock";

      const skuButtons = variants.length > 1
        ? `
          <div class="sku-options">
            ${variants.map(row => {
              const value = getValue(row, "sku") || "default";
              const label = getValue(row, "sku") || "Default";
              const isActive = row === selectedRow;
              return `<button class="sku-option ${isActive ? "active" : ""}" onclick="selectSku('${product.id}', '${value}')">${label}</button>`;
            }).join("")}
          </div>
        `
        : "";

      const thumbs = [0, 1, 2, 3, 4].map(index => {
        const src = imagePath(selectedRow, index);
        return `
          <button class="thumb" onclick="setMainImage('${src}', '${imageFallbackText(selectedRow)}')">
            <img src="${src}" alt="${getValue(selectedRow, "name")} image ${index + 1}" onerror="this.parentElement.style.display='none'">
          </button>
        `;
      }).join("");

      const buttonText = selectedStatus === "active" ? "Add to cart" : stockLabel;
      const buttonClass = selectedStatus === "active" ? "button" : "button disabled";

      modal.innerHTML = `
        <div>
          <div class="modal-main-image" id="modalMainImage">
            ${badge ? `<div class="badge">${badge}</div>` : ""}
            ${createImageHTML(selectedRow, 0)}
          </div>
          <div class="thumbs">${thumbs}</div>
        </div>

        <div class="modal-info">
          <h2>${getValue(selectedRow, "name")}</h2>
          <p>${getValue(selectedRow, "longdescription") || getValue(selectedRow, "shortdescription") || ""}</p>

          ${skuButtons}

          <div class="meta">
            <div class="price">${price}</div>
            <div class="stock">${stockLabel}</div>
          </div>

          <ul class="details-list">
            ${sku ? `<li><strong>Option:</strong> ${sku}</li>` : ""}
            ${getValue(selectedRow, "category") ? `<li><strong>Category:</strong> ${getValue(selectedRow, "category")}</li>` : ""}
            ${getValue(selectedRow, "materials") ? `<li><strong>Materials:</strong> ${getValue(selectedRow, "materials")}</li>` : ""}
            ${getValue(selectedRow, "weight") ? `<li><strong>Weight:</strong> ${getValue(selectedRow, "weight")}</li>` : ""}
            ${(getValue(selectedRow, "length") || getValue(selectedRow, "width") || getValue(selectedRow, "height")) ? `<li><strong>Size:</strong> ${getValue(selectedRow, "length")} × ${getValue(selectedRow, "width")} × ${getValue(selectedRow, "height")}</li>` : ""}
          </ul>

          <button class="${buttonClass}" onclick="alert('Cart will be added in the next step.')">${buttonText}</button>
        </div>
      `;
    }

    function selectSku(productId, skuValue) {
      const product = groupedProducts.find(p => p.id === productId);
      if (!product) return;

      const selected = product.variants.find(row => {
        const sku = getValue(row, "sku") || "default";
        return sku === skuValue;
      });

      if (selected) {
        renderModal(product, selected);
      }
    }

    function setMainImage(src, fallback) {
      document.getElementById("modalMainImage").innerHTML = `
        <img src="${src}" alt="Product image" onerror="this.replaceWith(document.createTextNode('${fallback}'))">
      `;
    }

    async function init() {
      try {
        const [settingsRows, productRows] = await Promise.all([
          loadCSV(SETTINGS_CSV_URL),
          loadCSV(PRODUCTS_CSV_URL)
        ]);

        applySettings(settingsRows);
        allRows = productRows;
        groupedProducts = groupProducts(allRows);

        renderCategories(groupedProducts);
        renderProducts();

        document.getElementById("searchInput").addEventListener("input", renderProducts);
        document.getElementById("categoryFilter").addEventListener("change", renderProducts);

        document.getElementById("modalClose").addEventListener("click", closeProductModal);
        document.getElementById("productModal").addEventListener("click", event => {
          if (event.target.id === "productModal") closeProductModal();
        });

        document.addEventListener("keydown", event => {
          if (event.key === "Escape") closeProductModal();
        });
      } catch (error) {
        console.error(error);
        document.getElementById("productGrid").innerHTML = '<div class="error">Could not load products. Please check the Google Sheets links.</div>';
      }
    }

    init();
  </script>
</body>
</html>
