<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lisha Studio | Handmade Art Objects</title>
  <meta name="description" content="Lisha Studio handmade art objects, candles, gifts, and playful little things." />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Nunito:wght@400;500;600;700;800&display=swap');

    :root {
      --bg: #fffdf8;
      --text: #1f1b18;
      --muted: #756d66;
      --line: #eee5dc;
      --soft: #fff4e4;
      --pink: #ffe8ec;
      --accent: #f08a5d;
      --accent-dark: #d9693f;
      --card: #ffffff;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Nunito", Arial, sans-serif;
    }

    header {
      padding: 26px 34px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 253, 248, 0.96);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    nav a {
      margin-left: 28px;
      color: var(--text);
      text-decoration: none;
      font-size: 16px;
      font-weight: 800;
    }

    nav a:hover { color: var(--accent-dark); }

    .hero-video {
      width: 100%;
      max-height: 420px;
      background: var(--soft);
      overflow: hidden;
      border-bottom: 1px solid var(--line);
      display: none;
    }

    .hero-video video,
    .hero-video iframe {
      width: 100%;
      height: 420px;
      display: block;
      object-fit: cover;
      border: 0;
    }

    .hero {
      max-width: 980px;
      margin: 0 auto;
      padding: 84px 24px 56px;
      text-align: center;
    }

    .hero h1 {
      font-family: "Baloo 2", cursive;
      font-size: clamp(48px, 8vw, 82px);
      line-height: 0.95;
      margin: 0 0 14px;
      letter-spacing: -1px;
    }

    .hero p {
      max-width: 660px;
      margin: 0 auto;
      color: var(--muted);
      font-size: 19px;
      line-height: 1.7;
    }

    .section {
      max-width: 1120px;
      margin: 0 auto;
      padding: 38px 24px 78px;
    }

    .section-title {
      font-family: "Baloo 2", cursive;
      font-size: 40px;
      margin: 0 0 24px;
      text-align: center;
      line-height: 1;
    }

    .filters {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 30px;
    }

    .filters input,
    .filters select {
      border: 1px solid var(--line);
      background: white;
      border-radius: 999px;
      padding: 13px 17px;
      font-family: "Nunito", sans-serif;
      font-size: 15px;
      min-width: 210px;
      outline: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 26px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 14px 34px rgba(80, 51, 32, 0.08);
      transition: transform 0.2s ease;
      cursor: pointer;
    }

    .card:hover { transform: translateY(-3px); }

    .image {
      position: relative;
      aspect-ratio: 1 / 1;
      background: linear-gradient(135deg, var(--soft), var(--pink));
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: "Baloo 2", cursive;
      font-size: 58px;
      color: var(--accent-dark);
    }

    .image img,
    .modal-main-image img,
    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      position: relative;
      z-index: 1;
    }

    .fallback-letter {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Baloo 2", cursive;
      font-size: 58px;
      color: var(--accent-dark);
    }

    .badge {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 2;
      background: rgba(255, 253, 248, 0.95);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 13px;
      font-weight: 900;
      color: var(--accent-dark);
      box-shadow: 0 8px 18px rgba(80, 51, 32, 0.08);
    }

    .card-body { padding: 19px; }

    .card h3 {
      font-family: "Baloo 2", cursive;
      font-size: 25px;
      line-height: 1.08;
      margin: 0 0 8px;
    }

    .desc {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.55;
      min-height: 46px;
      margin: 0 0 12px;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
      font-weight: 800;
    }

    .price { font-size: 18px; }

    .stock {
      font-size: 13px;
      color: var(--accent-dark);
      background: var(--soft);
      border-radius: 999px;
      padding: 5px 10px;
      white-space: nowrap;
    }

    .button {
      display: block;
      width: 100%;
      text-align: center;
      border: 1px solid var(--text);
      color: var(--text);
      background: white;
      text-decoration: none;
      border-radius: 999px;
      padding: 12px 14px;
      font-weight: 800;
      transition: 0.2s ease;
      cursor: pointer;
      font-family: "Nunito", Arial, sans-serif;
      font-size: 15px;
    }

    .button:hover {
      background: var(--text);
      color: white;
    }

    .button.disabled {
      opacity: 0.45;
      pointer-events: none;
    }

    .contact {
      border-top: 1px solid var(--line);
      padding: 62px 24px;
      text-align: center;
      background: #ffffff;
    }

    .contact p {
      max-width: 720px;
      margin: 0 auto;
      color: var(--muted);
      line-height: 1.8;
      font-size: 17px;
    }

    .contact-links {
      margin-top: 24px;
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .contact-links a {
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 11px 16px;
      text-decoration: none;
      font-weight: 800;
      background: var(--soft);
    }

    footer {
      text-align: center;
      padding: 32px 20px;
      color: var(--muted);
      font-size: 14px;
      border-top: 1px solid var(--line);
    }

    .loading,
    .error {
      text-align: center;
      color: var(--muted);
      padding: 36px;
      grid-column: 1 / -1;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(31, 27, 24, 0.45);
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
    }

    .modal {
      width: min(980px, 100%);
      max-height: 90vh;
      overflow: auto;
      background: var(--bg);
      border-radius: 34px;
      border: 1px solid var(--line);
      box-shadow: 0 30px 90px rgba(31, 27, 24, 0.25);
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 18px;
      right: 18px;
      border: 1px solid var(--line);
      background: white;
      border-radius: 999px;
      width: 40px;
      height: 40px;
      font-size: 22px;
      cursor: pointer;
      z-index: 3;
    }

    .modal-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
      padding: 34px;
    }

    .modal-main-image {
      position: relative;
      aspect-ratio: 1 / 1;
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: linear-gradient(135deg, var(--soft), var(--pink));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Baloo 2", cursive;
      font-size: 78px;
      color: var(--accent-dark);
    }

    .thumbs {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .thumb {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      border: 1px solid var(--line);
      overflow: hidden;
      background: var(--soft);
      cursor: pointer;
      padding: 0;
    }

    .modal-info h2 {
      font-family: "Baloo 2", cursive;
      font-size: clamp(38px, 5vw, 58px);
      line-height: 0.95;
      margin: 0 0 12px;
    }

    .modal-info p {
      color: var(--muted);
      line-height: 1.75;
      font-size: 16px;
    }

    .sku-options {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 16px 0;
    }

    .sku-option {
      border: 1px solid var(--line);
      background: white;
      border-radius: 999px;
      padding: 9px 14px;
      font-weight: 800;
      cursor: pointer;
      font-family: "Nunito", Arial, sans-serif;
    }

    .sku-option.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .details-list {
      margin: 14px 0 18px;
      padding: 0;
      list-style: none;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .details-list strong { color: var(--text); }

    @media (max-width: 850px) {
      header {
        justify-content: center;
        padding: 22px 18px;
      }

      nav a { margin: 0 9px; }

      .grid { grid-template-columns: repeat(2, 1fr); }

      .hero-video video,
      .hero-video iframe { height: 300px; }

      .modal-layout { grid-template-columns: 1fr; }
    }

    @media (max-width: 560px) {
      nav a {
        font-size: 15px;
        margin: 0 6px;
      }

      .hero { padding-top: 58px; }

      .grid { grid-template-columns: 1fr; }

      .filters input,
      .filters select { width: 100%; }

      .modal-layout { padding: 24px; }
    }
  </style>
</head>

<body>
  <header>
    <nav>
      <a href="/">Home</a>
      <a href="/#products">Products</a>
      <a href="/about.html">About</a>
      <a href="/#contact">Contact</a>
    </nav>
  </header>

  <section class="hero-video" id="videoArea"></section>

  <main>
    <section class="hero">
      <h1 id="heroTitle">Lisha Studio</h1>
      <p id="heroSubtitle">Handmade art objects, candles, gifts, and playful little things.</p>
    </section>

    <section class="section" id="products">
      <h2 class="section-title" id="featuredTitle">Featured Pieces</h2>

      <div class="filters">
        <input id="searchInput" type="search" placeholder="Search pieces..." />
        <select id="categoryFilter">
          <option value="all">All categories</option>
        </select>
      </div>

      <div class="grid" id="productGrid">
        <div class="loading">Loading products...</div>
      </div>
    </section>

    <section class="contact" id="contact">
      <h2 class="section-title">Contact</h2>
      <p id="contactNote">For custom orders, collaborations, or questions, feel free to contact me.</p>
      <div class="contact-links" id="contactLinks"></div>
    </section>
  </main>

  <div class="modal-backdrop" id="productModal">
    <div class="modal">
      <button class="modal-close" id="modalClose">×</button>
      <div class="modal-layout" id="modalContent"></div>
    </div>
  </div>

  <footer>
    © 2026 Lisha Studio · Handmade art objects
  </footer>

  <script>
    const SETTINGS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRQ5vcuUBnI85arPNNe2h-aqwqq_9RpCBN0oewhCexPjWd-nX7YW-j3ii_5JlwvZZ7VlyjZ_RSTVwD5/pub?gid=0&single=true&output=csv";
    const PRODUCTS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRQ5vcuUBnI85arPNNe2h-aqwqq_9RpCBN0oewhCexPjWd-nX7YW-j3ii_5JlwvZZ7VlyjZ_RSTVwD5/pub?gid=22339288&single=true&output=csv";
    const IMAGE_BASE_URL = "https://pub-32f3f529081e4033a9e6ecf3fd1297ae.r2.dev/images/";

    let productGroups = [];
    let settings = {};

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let value = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const nextChar = text[i + 1];

        if (char === '"' && inQuotes && nextChar === '"') {
          value += '"';
          i++;
        } else if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === "," && !inQuotes) {
          row.push(value);
          value = "";
        } else if ((char === "\n" || char === "\r") && !inQuotes) {
          if (value || row.length) {
            row.push(value);
            rows.push(row);
            row = [];
            value = "";
          }
          if (char === "\r" && nextChar === "\n") i++;
        } else {
          value += char;
        }
      }

      if (value || row.length) {
        row.push(value);
        rows.push(row);
      }

      return rows;
    }

    function rowsToObjects(rows) {
      if (!rows.length) return [];
      const headers = rows[0].map(h => h.trim().toLowerCase());

      return rows.slice(1)
        .filter(row => row.some(cell => String(cell).trim() !== ""))
        .map(row => {
          const obj = {};
          headers.forEach((header, index) => {
            obj[header] = row[index] ? row[index].trim() : "";
          });
          return obj;
        });
    }

    async function loadCSV(url) {
      const response = await fetch(url + "&cacheBust=" + Date.now());
      if (!response.ok) throw new Error("Could not load CSV");
      const text = await response.text();
      return rowsToObjects(parseCSV(text));
    }

    function val(row, key) {
      return row[key.toLowerCase()] || "";
    }

    function money(value) {
      const n = Number(value);
      if (Number.isNaN(n)) return "";
      return "USD " + n.toFixed(2);
    }

    function getStatus(row) {
      const status = val(row, "status").trim().toLowerCase();

      if (status === "hidden") return "hidden";

      const hasRequired =
        val(row, "id") &&
        val(row, "name") &&
        val(row, "price") &&
        val(row, "category");

      if (status !== "active" || !hasRequired) return "comingsoon";

      const stock = Number(val(row, "stock") || 0);
      if (stock <= 0) return "soldout";

      return "active";
    }

    function statusLabel(status) {
      if (status === "soldout") return "Sold out";
      if (status === "comingsoon") return "Coming soon";
      return "";
    }

    function imageUrl(name) {
      return IMAGE_BASE_URL + name + ".jpg";
    }

    function coverImage(row) {
      return imageUrl(`${val(row, "id")}-cover`);
    }

    function skuImage(row) {
      const id = val(row, "id");
      const sku = val(row, "sku");
      return sku ? imageUrl(`${id}-${sku}`) : coverImage(row);
    }

    function detailImage(row, number) {
      return imageUrl(`${val(row, "id")}-${number}`);
    }

    function fallbackLetter(row) {
      const name = val(row, "name");
      return name ? name.charAt(0).toUpperCase() : "✦";
    }

    function imageBlock(src, row, badge = "") {
      return `
        ${badge ? `<div class="badge">${badge}</div>` : ""}
        <span class="fallback-letter">${fallbackLetter(row)}</span>
        <img src="${src}" alt="${val(row, "name")}" loading="lazy" onerror="this.style.display='none'">
      `;
    }

    function groupProducts(rows) {
      const visibleRows = rows.filter(row => getStatus(row) !== "hidden");
      const map = new Map();

      visibleRows.forEach(row => {
        const id = val(row, "id");
        if (!id) return;
        if (!map.has(id)) map.set(id, []);
        map.get(id).push(row);
      });

      return Array.from(map.entries()).map(([id, rows]) => {
        const activeRows = rows.filter(row => getStatus(row) === "active");
        const soldoutRows = rows.filter(row => getStatus(row) === "soldout");
        const comingRows = rows.filter(row => getStatus(row) === "comingsoon");

        let groupStatus = "comingsoon";
        if (activeRows.length > 0) groupStatus = "active";
        else if (soldoutRows.length > 0 && comingRows.length === 0) groupStatus = "soldout";

        const displayRow = activeRows[0] || soldoutRows[0] || comingRows[0] || rows[0];

        return {
          id,
          rows,
          displayRow,
          status: groupStatus,
          name: val(displayRow, "name"),
          category: val(displayRow, "category")
        };
      });
    }

    function productPrice(group) {
      const validRows = group.rows.filter(row => {
        const status = getStatus(row);
        return status === "active" || status === "soldout";
      });

      const prices = validRows
        .map(row => Number(val(row, "price")))
        .filter(n => !Number.isNaN(n));

      if (!prices.length) return "";

      const min = Math.min(...prices);
      const max = Math.max(...prices);

      return min === max ? money(min) : "From " + money(min);
    }

    function productStock(group) {
      if (group.status === "comingsoon") return "Coming soon";
      if (group.status === "soldout") return "Sold out";

      const total = group.rows
        .filter(row => getStatus(row) === "active")
        .reduce((sum, row) => sum + Number(val(row, "stock") || 0), 0);

      return total + " in stock";
    }

    function productDescription(group) {
      return val(group.displayRow, "shortdescription") || val(group.displayRow, "longdescription") || "";
    }

    function productCard(group) {
      const badge = statusLabel(group.status);
      const cover = coverImage(group.displayRow);

      return `
        <article class="card" onclick="openProductModal('${group.id}')">
          <div class="image">
            ${imageBlock(cover, group.displayRow, badge)}
          </div>
          <div class="card-body">
            <h3>${group.name}</h3>
            <p class="desc">${productDescription(group)}</p>
            <div class="meta">
              <div class="price">${productPrice(group)}</div>
              <div class="stock">${productStock(group)}</div>
            </div>
          </div>
        </article>
      `;
    }

    function applySettings(rows) {
      rows.forEach(row => {
        const key = val(row, "key").toLowerCase();
        const value = val(row, "value");
        if (key) settings[key] = value;
      });

      const title = settings["index.herotitle"] || settings.herotitle || "Lisha Studio";
      const subtitle = settings["index.herosubtitle"] || settings.herosubtitle || "Handmade art objects, candles, gifts, and playful little things.";
      const featured = settings["index.featuredtitle"] || "Featured Pieces";
      const video = settings["index.herovideo"] || settings.herovideo || "";
      const contactNote = settings["contact.note"] || settings.contactnote || "For custom orders, collaborations, or questions, feel free to contact me.";
      const email = settings["contact.email"] || settings.contactemail || "";
      const instagram = settings["contact.instagram"] || settings.contactinstagram || "";
      const youtube = settings["contact.youtube"] || settings.contactyoutube || settings.youtube || "";

      document.title = title + " | Handmade Art Objects";
      document.getElementById("heroTitle").textContent = title;
      document.getElementById("heroSubtitle").textContent = subtitle;
      document.getElementById("featuredTitle").textContent = featured;
      document.getElementById("contactNote").textContent = contactNote;

      const links = document.getElementById("contactLinks");
      links.innerHTML = "";

      if (email) links.innerHTML += `<a href="mailto:${email}">Email</a>`;
      if (instagram) links.innerHTML += `<a href="${instagram}" target="_blank" rel="noopener">Instagram</a>`;
      if (youtube) links.innerHTML += `<a href="${youtube}" target="_blank" rel="noopener">YouTube</a>`;

      const videoArea = document.getElementById("videoArea");

      if (!video) {
        videoArea.style.display = "none";
        videoArea.innerHTML = "";
      } else {
        videoArea.style.display = "block";

        if (video.includes("youtube.com") || video.includes("youtu.be") || video.includes("vimeo.com")) {
          videoArea.innerHTML = `<iframe src="${video}" allowfullscreen></iframe>`;
        } else {
          videoArea.innerHTML = `<video autoplay muted loop playsinline><source src="${video}" /></video>`;
        }
      }
    }

    function renderCategories() {
      const select = document.getElementById("categoryFilter");
      select.innerHTML = `<option value="all">All categories</option>`;

      [...new Set(productGroups.map(group => group.category).filter(Boolean))]
        .sort()
        .forEach(category => {
          select.innerHTML += `<option value="${category}">${category}</option>`;
        });
    }

    function renderProducts() {
      const grid = document.getElementById("productGrid");
      const query = document.getElementById("searchInput").value.trim().toLowerCase();
      const category = document.getElementById("categoryFilter").value;

      const filtered = productGroups.filter(group => {
        const text = group.rows.map(row => [
          val(row, "id"),
          val(row, "name"),
          val(row, "sku"),
          val(row, "category"),
          val(row, "materials"),
          val(row, "shortdescription"),
          val(row, "longdescription")
        ].join(" ")).join(" ").toLowerCase();

        return text.includes(query) && (category === "all" || group.category === category);
      });

      grid.innerHTML = filtered.length
        ? filtered.map(productCard).join("")
        : `<div class="error">No products found.</div>`;
    }

    function openProductModal(id) {
      const group = productGroups.find(group => group.id === id);
      if (!group) return;

      const firstActive = group.rows.find(row => getStatus(row) === "active");
      const selectedRow = firstActive || group.displayRow;

      renderModal(group, selectedRow, coverImage(group.displayRow));

      document.getElementById("productModal").style.display = "flex";
      document.body.style.overflow = "hidden";
    }

    function closeProductModal() {
      document.getElementById("productModal").style.display = "none";
      document.body.style.overflow = "";
    }

    function thumb(src, row, badge) {
      return `
        <button class="thumb" onclick="setModalImage('${src}', '${fallbackLetter(row)}', '${badge}')">
          <img src="${src}" alt="${val(row, "name")} image" loading="lazy" onerror="this.parentElement.style.display='none'">
        </button>
      `;
    }

    function renderModal(group, selectedRow, mainImageSrc) {
      const status = getStatus(selectedRow);
      const badge = statusLabel(status);
      const sku = val(selectedRow, "sku");
      const stock = Number(val(selectedRow, "stock") || 0);

      const stockText =
        status === "active" ? stock + " in stock" :
        status === "soldout" ? "Sold out" :
        "Coming soon";

      const priceText =
        status === "active" || status === "soldout"
          ? money(val(selectedRow, "price"))
          : "";

      const skuButtons = group.rows.length > 1
        ? `
          <div class="sku-options">
            ${group.rows.map(row => {
              const label = val(row, "sku") || "Default";
              const active = row === selectedRow ? "active" : "";
              return `<button class="sku-option ${active}" onclick="selectSku('${group.id}', '${label}')">${label}</button>`;
            }).join("")}
          </div>
        `
        : "";

      const coverThumb = thumb(coverImage(group.displayRow), group.displayRow, badge);

      const skuThumbs = group.rows
        .filter(row => val(row, "sku"))
        .map(row => thumb(skuImage(row), row, badge))
        .join("");

      const detailThumbs = [1, 2, 3, 4, 5]
        .map(number => thumb(detailImage(group.displayRow, number), group.displayRow, badge))
        .join("");

      const actionButton = status === "active"
        ? `<button class="button" onclick="alert('Cart will be added later.')">Add to cart</button>`
        : `<button class="button disabled">${stockText}</button>`;

      document.getElementById("modalContent").innerHTML = `
        <div>
          <div class="modal-main-image" id="modalMainImage">
            ${imageBlock(mainImageSrc, selectedRow, badge)}
          </div>
          <div class="thumbs">
            ${coverThumb}
            ${skuThumbs}
            ${detailThumbs}
          </div>
        </div>

        <div class="modal-info">
          <h2>${val(selectedRow, "name")}</h2>
          <p>${val(selectedRow, "longdescription") || val(selectedRow, "shortdescription") || ""}</p>

          ${skuButtons}

          <div class="meta">
            <div class="price">${priceText}</div>
            <div class="stock">${stockText}</div>
          </div>

          <ul class="details-list">
            ${sku ? `<li><strong>Option:</strong> ${sku}</li>` : ""}
            ${val(selectedRow, "category") ? `<li><strong>Category:</strong> ${val(selectedRow, "category")}</li>` : ""}
            ${val(selectedRow, "materials") ? `<li><strong>Materials:</strong> ${val(selectedRow, "materials")}</li>` : ""}
            ${val(selectedRow, "weight") ? `<li><strong>Weight:</strong> ${val(selectedRow, "weight")}</li>` : ""}
            ${(val(selectedRow, "length") || val(selectedRow, "width") || val(selectedRow, "height"))
              ? `<li><strong>Size:</strong> ${val(selectedRow, "length")} × ${val(selectedRow, "width")} × ${val(selectedRow, "height")}</li>`
              : ""}
          </ul>

          ${actionButton}
        </div>
      `;
    }

    function selectSku(groupId, skuLabel) {
      const group = productGroups.find(group => group.id === groupId);
      if (!group) return;

      const selected = group.rows.find(row => (val(row, "sku") || "Default") === skuLabel);

      if (selected) {
        renderModal(group, selected, skuImage(selected));
      }
    }

    function setModalImage(src, fallback, badge) {
      document.getElementById("modalMainImage").innerHTML = `
        ${badge ? `<div class="badge">${badge}</div>` : ""}
        <span class="fallback-letter">${fallback}</span>
        <img src="${src}" alt="Product image" onerror="this.style.display='none'">
      `;
    }

    async function init() {
      try {
        const [settingsRows, productRows] = await Promise.all([
          loadCSV(SETTINGS_CSV_URL),
          loadCSV(PRODUCTS_CSV_URL)
        ]);

        applySettings(settingsRows);
        productGroups = groupProducts(productRows);

        renderCategories();
        renderProducts();

        document.getElementById("searchInput").addEventListener("input", renderProducts);
        document.getElementById("categoryFilter").addEventListener("change", renderProducts);

        document.getElementById("modalClose").addEventListener("click", closeProductModal);

        document.getElementById("productModal").addEventListener("click", event => {
          if (event.target.id === "productModal") closeProductModal();
        });

        document.addEventListener("keydown", event => {
          if (event.key === "Escape") closeProductModal();
        });
      } catch (error) {
        console.error(error);
        document.getElementById("productGrid").innerHTML = `<div class="error">Could not load products. Please check the Google Sheets links.</div>`;
      }
    }

    init();
  </script>
</body>
</html>
